trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageRepository: 'enterprise-cicd'
  dockerRegistryServiceConnection: 'ACR-ServiceConnection'
  sonarServiceConnection: 'SonarQubeCloud'
  tag: '$(Build.BuildId)'

steps:

- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.12'
  displayName: 'Use Python 3.12'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Install Dependencies'

- script: |
    pytest -v
  displayName: 'Run Unit Tests'

# ---------- SonarQube Cloud ----------

- task: SonarQubePrepare@3
  displayName: 'Prepare SonarQube Analysis'
  inputs:
    SonarQube: '$(sonarServiceConnection)'
    scannerMode: 'CLI'
    configMode: 'manual'
    cliProjectKey: 'Tharunv4444_enterprise-cicd-pipeline'
    cliProjectName: 'enterprise-cicd-pipeline'
    cliSources: 'app'

- task: SonarQubeAnalyze@3
  displayName: 'Run SonarQube Analysis'

- task: SonarQubePublish@3
  displayName: 'Publish Quality Gate'
  inputs:
    pollingTimeoutSec: '300'

# ---------- Docker ----------

- task: Docker@2
  displayName: 'Build and Push Docker Image'
  inputs:
    command: buildAndPush
    repository: $(imageRepository)
    dockerfile: Dockerfile
    containerRegistry: $(dockerRegistryServiceConnection)
    tags: |
      $(tag)
      latest