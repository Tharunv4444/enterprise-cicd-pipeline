trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageRepository: 'enterprise-cicd'
  dockerRegistryServiceConnection: 'ACR-ServiceConnection'
  tag: '$(Build.BuildId)'

steps:

- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.12'
  displayName: 'Use Python 3.12'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Install Dependencies'

- script: |
    pytest -v
  displayName: 'Run Unit Tests'

# Prepare Analysis
- task: SonarCloudPrepare@4
  inputs:
    SonarQube: 'SonarQubeCloud'
    organization: 'tharunv4444'
    scannerMode: 'cli'
    configMode: 'manual'
    cliProjectKey: 'Tharunv4444_enterprise-cicd-pipeline'
    cliProjectName: 'enterprise-cicd-pipeline'
    cliSources: '.'

# Run Analysis
- task: SonarCloudAnalyze@4

# Publish Quality Gate
- task: SonarCloudPublish@4
  inputs:
    pollingTimeoutSec: '300'

# Docker
- task: Docker@2
  displayName: 'Build and Push Docker Image'
  inputs:
    command: buildAndPush
    repository: $(imageRepository)
    dockerfile: Dockerfile
    containerRegistry: $(dockerRegistryServiceConnection)
    tags: |
      $(tag)
      latest